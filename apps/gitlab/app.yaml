id: gitlab
name: GitLab
version: 1.0.0
description: Access GitLab projects, issues, merge requests, pipelines, commits, branches, and repository files through the GitLab REST API.
auth:
  required: true
  methods:
    - id: gitlab-access-token
      type: header
      label: Personal, project, or group access token
      header: PRIVATE-TOKEN
      default: true
icon:
  svg: assets/icon.svg
  background:
    light: "#FFF3EC"
    dark: "#171321"
endpoints:
  gitlab_rest:
    kind: rest
    url: https://gitlab.com/api/v4
    description: GitLab REST API for GitLab.com.
skills:
  - skills/projects/SKILL.md
  - skills/issues/SKILL.md
