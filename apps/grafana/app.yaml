id: grafana
name: Grafana
version: 1.0.1
description: Inspect Grafana dashboards, data sources, queries, and alert rules through the Grafana HTTP API.
auth:
  required: true
  methods:
    - id: grafana-service-account-token
      type: bearer
      label: Service Account Token
      default: true
icon:
  svg: assets/icon.svg
  background:
    light: "#FFF4EA"
    dark: "#20130B"
endpoints:
  grafana_rest:
    kind: rest
    url: http://localhost:3000
    url_config:
      label: Grafana address
      description: Root URL of the Grafana instance.
      placeholder: https://grafana.example.com
      required: true
    description: Grafana HTTP API.
skills:
  - skills/dashboards/SKILL.md
  - skills/alerting/SKILL.md
