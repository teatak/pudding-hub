id: github
name: GitHub
version: 1.0.0
description: Access GitHub repositories, issues, pull requests, and GraphQL data through configured endpoints.
auth:
  required: true
  methods:
    - id: github-oauth
      type: oauth2
      provider: github
      label: GitHub OAuth
      default: true
    - id: github-pat
      type: bearer
      label: Personal access token
icon:
  svg: assets/icon.svg
  color:
    light: "#111111"
    dark: "#ffffff"
  background:
    light: "#ffffff"
    dark: "#111111"
endpoints:
  github_rest:
    kind: rest
    url: https://api.github.com
    description: GitHub REST API.
  github_graphql:
    kind: graphql
    url: https://api.github.com/graphql
    description: GitHub GraphQL API.
skills:
  - skills/repositories/SKILL.md
  - skills/issues/SKILL.md
