<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="machine-container">
    
    <!-- 顶栏 -->
    <div class="header">
      <div class="conflict-header">
        <span class="conflict-title" id="ticker-text">分歧事项：等待输入</span>
        <button class="btn-header-reset" id="btn-change-conflict" title="修改分歧" aria-label="修改分歧">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="display: block;">
            <path d="M12 20h9"></path>
            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
          </svg>
        </button>
      </div>
      <button class="btn-header-icon" id="btn-leaderboard" title="排行榜" aria-label="排行榜">🏆</button>
    </div>

    <!-- 摇杆 -->
    <div class="lever-rail" id="lever-rail">
      <div class="lever-handle" id="lever-handle"></div>
    </div>

    <!-- 对局对决视图 (自适应高度) -->
    <div id="match-view" class="match-panel" style="display: flex;">
      <div class="duel-layout">
        <!-- 垂直一体圆筒：固定比例 -->
        <div class="arena">
          <div class="arena-content">
            <span class="chamber-label label-top-outer" id="label-top">等待玩家</span>

            <div class="cylinder" id="cylinder-body">
              <div class="cylinder-glass-glare"></div>

              <!-- 上半仓 -->
              <div class="chamber chamber-top">
                <!-- 上滑遮盖门 -->
                <div class="shutter shutter-top" id="shutter-top">
                  <span class="shutter-icon">⚙️</span>
                  <div class="shutter-indicator" id="indicator-top"></div>
                </div>
                <span class="gesture-display" id="display-top">?</span>
              </div>

              <!-- 下半仓 -->
              <div class="chamber chamber-bottom">
                <!-- 下滑遮盖门 -->
                <div class="shutter shutter-bottom" id="shutter-bottom">
                  <span class="shutter-icon">⚙️</span>
                  <div class="shutter-indicator" id="indicator-bottom"></div>
                </div>
                <span class="gesture-display" id="display-bottom">?</span>
              </div>

              <!-- 倒计时指示层 -->
              <div class="countdown-overlay" id="countdown-overlay">
                <span class="countdown-num" id="countdown-text">3</span>
              </div>
            </div>

            <span class="chamber-label label-bottom-outer" id="label-bottom">等待玩家</span>

            <!-- 玩家手势选择按钮 -->
            <div class="button-group" id="gesture-buttons">
              <button class="btn-gesture" data-choice="rock" title="石头" aria-label="石头">✊</button>
              <button class="btn-gesture" data-choice="paper" title="布" aria-label="布">🖐️</button>
              <button class="btn-gesture" data-choice="scissors" title="剪刀" aria-label="剪刀">✌️</button>
            </div>

            <button class="btn-next-round" id="btn-next-round">发起邀请</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="leaderboard-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="leaderboard-title">🏆 对弈排行榜</span>
        <button class="modal-close" id="leaderboard-close" aria-label="关闭">&times;</button>
      </div>
      <div class="leaderboard-table-container">
        <table class="leaderboard-table">
          <thead>
            <tr>
              <th id="rank-head">排名</th>
              <th id="player-head">选手</th>
              <th id="total-head">对局</th>
              <th id="win-head">胜</th>
              <th id="lose-head">负</th>
              <th id="draw-head">平</th>
              <th id="rate-head">胜率</th>
            </tr>
          </thead>
          <tbody id="leaderboard-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="conflict-modal">
    <div class="modal-content">
      <div class="modal-header">
        <span class="modal-title" id="conflict-modal-title">修改分歧事项</span>
        <button class="modal-close" id="conflict-close" aria-label="关闭">&times;</button>
      </div>
      <div class="init-form" style="display: flex; width: 100%;">
        <textarea class="init-textarea" id="conflict-input" placeholder="输入需要解决的分歧事项... (例如：谁去拿快递，谁今天去洗碗，或者今天谁最美)&#10;支持多行输入..." maxlength="2000"></textarea>
        <button class="btn-brass" id="btn-start-arbitrate">保存分歧</button>
      </div>
    </div>
  </div>

  <script src="./src/i18n.js"></script>
  <script src="./src/app.js"></script>
</body>
</html>
